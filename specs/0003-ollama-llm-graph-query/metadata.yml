  - "Multi-turn conversational graph agent with memory once single-shot NL->Cypher is trusted"
  - "Model benchmark harness: tokens/sec, Cypher-validity rate, answer-grounding rate across the §5 candidates"
  - "Embedding-based semantic search over captions/comments via a local Ollama embedding model"
